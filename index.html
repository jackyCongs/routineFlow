<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8" />
    <meta http-equiv="X-UA-Compatible" content="IE=edge" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, maximum-scale=1, minimum-scale=1" />
    <title>RoutineFlow</title>
    <meta name="description" content="A local web app for creating, organizing, and repeating tasks. Features a modern UI designed for focus and productivity." />
    <!-- Google Font -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap" rel="stylesheet" />
    <!-- PWA & Add to Home Screen -->
    <link rel="manifest" href="manifest.json" />
    <link rel="apple-touch-icon" href="icon.png" />
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="default">
    <meta name="theme-color" content="#edf2f7">

    <link rel="stylesheet" href="style.css?v=13" />
    <!-- SortableJS for drag-and-drop ordering -->
    <script src="https://cdn.jsdelivr.net/npm/sortablejs@1.15.0/Sortable.min.js"></script>
    <!-- Chart.js for statistics -->
    <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.1/dist/chart.umd.min.js"></script>
</head>
<body>
    <header class="header">
        <h1>RoutineFlow</h1>
    </header>
    <main class="main">
        <!-- Tasks View -->
        <section id="tasksView">
            <div id="taskList"></div>
        </section>

        <!-- Statistics View -->
        <section id="statsView" style="display: none;">
            <div class="stats-card">
                <h3>Last 7 Days Completion</h3>
                <canvas id="completionChart"></canvas>
            </div>
            <div class="stats-card mt-4">
                <h3>Top Tasks</h3>
                <ul id="topTasksList" class="top-tasks-list"></ul>
            </div>
        </section>

        <!-- Floating Action Button -->
        <button id="openModalBtn" class="fab" aria-label="Add Task" title="Add Task">＋</button>

        <!-- Modal for adding tasks -->
        <div id="taskModal" class="modal" aria-hidden="true">
          <div class="modal-content">
            <h2>New Task</h2>
            <input type="text" id="titleInput" placeholder="Task Title" />
            <select id="parentSelect">
              <option value="">No Parent (Root Task)</option>
            </select>
            <select id="recurrenceSelect">
              <option value="none">Does not repeat</option>
              <option value="daily">Daily</option>
              <option value="weekly">Weekly</option>
              <option value="monthly">Monthly</option>
              <option value="half-yearly">Bi-annually</option>
            </select>
            <!-- Dynamic recurrence details -->
            <div id="recurrenceDetails" style="display: none; margin-bottom: 0.75rem; gap: 0.5rem;">
              <select id="weeklyDaySelect" style="display: none; margin-bottom: 0;">
                <option value="1">Monday</option>
                <option value="2">Tuesday</option>
                <option value="3">Wednesday</option>
                <option value="4">Thursday</option>
                <option value="5">Friday</option>
                <option value="6">Saturday</option>
                <option value="0">Sunday</option>
              </select>
              <select id="monthlyDaySelect" style="display: none; margin-bottom: 0;">
                <!-- Options 1-31 will be generated by JS -->
              </select>
              <select id="halfYearlyMonthSelect" style="display: none; margin-bottom: 0; flex: 1;">
                <option value="0">Month 1 (e.g., Jan/Jul)</option>
                <option value="1">Month 2 (e.g., Feb/Aug)</option>
                <option value="2">Month 3 (e.g., Mar/Sep)</option>
                <option value="3">Month 4 (e.g., Apr/Oct)</option>
                <option value="4">Month 5 (e.g., May/Nov)</option>
                <option value="5">Month 6 (e.g., Jun/Dec)</option>
              </select>
              <select id="halfYearlyDaySelect" style="display: none; margin-bottom: 0; flex: 1;">
                <!-- Options 1-31 will be generated by JS -->
              </select>
            </div>
            <div class="reminder-row">
              <label class="toggle-label">
                <span>Reminder</span>
                <input type="checkbox" id="reminderToggle" />
                <span class="toggle-slider"></span>
              </label>
              <input type="time" id="reminderTime" disabled />
            </div>
            <div class="modal-actions">
              <button id="saveTaskBtn" class="primary">Save</button>
              <button id="cancelTaskBtn" class="secondary">Cancel</button>
            </div>
          </div>
        </div>
        <section class="task-list" id="taskList">
            <!-- Task list will be dynamically rendered by JavaScript -->
        </section>
        
        <!-- Add to Home Screen Prompt -->
        <div id="a2hsPrompt" class="a2hs-prompt" aria-hidden="true">
          <div class="a2hs-content">
            <button class="a2hs-close" id="a2hsClose" aria-label="Close">×</button>
            <img src="icon.png" alt="App Icon" class="a2hs-icon" />
            <div class="a2hs-text">
              <h3>Install RoutineFlow</h3>
              <p id="a2hsInstructions">Add to your home screen for a full-screen app experience.</p>
            </div>
            <button id="a2hsInstallBtn" class="primary" style="display: none; width: auto; padding: 0.5rem 1rem;">Install</button>
          </div>
        </div>
    
    <nav class="bottom-nav">
        <div class="bottom-nav-item active" data-tab="tasks">
            <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="nav-icon"><path d="M9 11l3 3L22 4"/><path d="M21 12v7a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h11"/></svg>
            <span class="nav-label">Tasks</span>
        </div>
        <div class="bottom-nav-item" data-tab="stats">
            <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="nav-icon"><rect x="18" y="3" width="4" height="18"/><rect x="10" y="8" width="4" height="13"/><rect x="2" y="13" width="4" height="8"/></svg>
            <span class="nav-label">Stats</span>
        </div>
    </nav>
    <script type="module" src="js/main.js?v=13"></script>
</body>
</html>
