<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8" />
    <meta http-equiv="X-UA-Compatible" content="IE=edge" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, maximum-scale=1, minimum-scale=1" />
    <title>RoutineFlow – 日常习惯打卡</title>
    <meta name="description" content="创建、组织、重复任务的本地 Web 应用，界面时尚，适合年轻人使用。" />
    <!-- Google Font -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap" rel="stylesheet" />
    <link rel="stylesheet" href="style.css" />
    <!-- SortableJS for drag‑and‑drop ordering -->
    <script src="https://cdn.jsdelivr.net/npm/sortablejs@1.15.0/Sortable.min.js"></script>
</head>
<body>
    <header class="header">
        <h1>RoutineFlow</h1>
    </header>
    <main class="main">
        <!-- Floating Action Button -->
        <button id="openModalBtn" class="fab" aria-label="添加任务" title="添加任务">＋</button>

        <!-- Modal for adding tasks -->
        <div id="taskModal" class="modal" aria-hidden="true">
          <div class="modal-content">
            <h2>新建任务</h2>
            <input type="text" id="titleInput" placeholder="任务标题" />
            <select id="parentSelect">
              <option value="">无父任务（主任务）</option>
            </select>
            <select id="recurrenceSelect">
              <option value="none">不重复</option>
              <option value="daily">每日</option>
              <option value="weekly">每周</option>
              <option value="monthly">每月</option>
              <option value="half-yearly">每半年</option>
            </select>
            <!-- Dynamic recurrence details -->
            <div id="recurrenceDetails" style="display: none; margin-bottom: 0.75rem; gap: 0.5rem;">
              <select id="weeklyDaySelect" style="display: none; margin-bottom: 0;">
                <option value="1">周一</option>
                <option value="2">周二</option>
                <option value="3">周三</option>
                <option value="4">周四</option>
                <option value="5">周五</option>
                <option value="6">周六</option>
                <option value="0">周日</option>
              </select>
              <select id="monthlyDaySelect" style="display: none; margin-bottom: 0;">
                <!-- Options 1-31 will be generated by JS -->
              </select>
              <select id="halfYearlyMonthSelect" style="display: none; margin-bottom: 0; flex: 1;">
                <option value="0">第1个月 (如1月/7月)</option>
                <option value="1">第2个月 (如2月/8月)</option>
                <option value="2">第3个月 (如3月/9月)</option>
                <option value="3">第4个月 (如4月/10月)</option>
                <option value="4">第5个月 (如5月/11月)</option>
                <option value="5">第6个月 (如6月/12月)</option>
              </select>
              <select id="halfYearlyDaySelect" style="display: none; margin-bottom: 0; flex: 1;">
                <!-- Options 1-31 will be generated by JS -->
              </select>
            </div>
            <div class="reminder-row">
              <label class="toggle-label">
                <span>提醒</span>
                <input type="checkbox" id="reminderToggle" />
                <span class="toggle-slider"></span>
              </label>
              <input type="time" id="reminderTime" disabled />
            </div>
            <div class="modal-actions">
              <button id="saveTaskBtn" class="primary">保存</button>
              <button id="cancelTaskBtn" class="secondary">取消</button>
            </div>
          </div>
        </div>
        <section class="task-list" id="taskList">
            <!-- 任务列表将由 JavaScript 动态渲染 -->
        </section>
    </main>
    <script src="app.js"></script>
</body>
</html>
